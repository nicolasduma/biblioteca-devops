<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Livro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cadastro de Livro</h1>
    <div id="Conteiner">
        <input id="nome" placeholder="digite o nome do livro">
        <input id="paginas" type="number" placeholder="digite a quantidade de páginas">
        <button onclick="salvarLivro()">SALVAR</button>
        <button onclick="window.location.href='livros.html'">Ver livros</button>
    </div>

    <script>
        function salvarLivro() {
            const nome = document.getElementById('nome').value.trim();
            const paginas = document.getElementById('paginas').value.trim();

            if (nome === '' || paginas === '') {
                alert('Preencha o nome e a quantidade de páginas.');
                return;
            }

            const livros = JSON.parse(localStorage.getItem('livros')) || [];
            livros.push({ nome: nome, paginas: paginas });
            localStorage.setItem('livros', JSON.stringify(livros));

            document.getElementById('nome').value = '';
            document.getElementById('paginas').value = '';

            alert('Livro salvo com sucesso!');
        }
    </script>
</body>
</html>
